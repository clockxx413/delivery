<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园快递代取平台 - Campus Delivery</title>
<style>/* ============================================================
   DESIGN SYSTEM
   ============================================================ */
:root {
  --primary: #4F6EF7;
  --primary-dark: #3D5CF0;
  --primary-light: #EEF1FE;
  --success: #22C55E;
  --success-light: #ECFDF5;
  --warning: #F59E0B;
  --warning-light: #FFF7ED;
  --danger: #EF4444;
  --danger-light: #FEF2F2;
  --bg: #F3F4F6;
  --card: #FFFFFF;
  --text: #1F2937;
  --text-secondary: #6B7280;
  --text-muted: #9CA3AF;
  --border: #E5E7EB;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: all .15s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
a { color: var(--primary); text-decoration: none; }

/* ============================================================
   NAVBAR
   ============================================================ */
.navbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
}
.navbar-brand .icon {
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
}
.navbar-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.navbar-nav button {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  border: none;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.navbar-nav button:hover { background: var(--bg); color: var(--text); }
.navbar-nav button.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.navbar-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.navbar-user .avatar {
  width: 34px; height: 34px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}
.navbar-user .user-name { font-size: 13px; font-weight: 500; }
.navbar-user .user-role {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  background: var(--primary-light);
  color: var(--primary);
}
.navbar-user .user-role.admin { background: #FEF2F2; color: var(--danger); }
.navbar-user .user-role.runner { background: #FFF7ED; color: var(--warning); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #1EA34D; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { background: #D97706; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; }
.btn-ghost { background: none; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg); }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 3px 10px; font-size: 11px; border-radius: 5px; }
.btn-lg { padding: 14px 28px; font-size: 15px; }
.btn-block { display: flex; width: 100%; justify-content: center; }

/* ============================================================
   CONTAINER
   ============================================================ */
.container {
  max-width: 1120px;
  margin: 0 auto;
  padding: 24px;
}
.view { display: none; }
.view.active { display: block; }

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
.auth-wrapper {
  min-height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  background: var(--card);
  border-radius: 16px;
  padding: 40px;
  width: 420px;
  max-width: 100%;
  box-shadow: var(--shadow-lg);
}
.auth-card h2 { font-size: 22px; margin-bottom: 4px; }
.auth-card .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; }
.auth-tabs button {
  flex: 1;
  text-align: center;
  padding: 10px;
  border: none;
  background: none;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid var(--border);
  transition: var(--transition);
}
.auth-tabs button.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 600;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  transition: var(--transition);
  background: #FAFBFC;
  color: var(--text);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,110,247,.1);
  background: #fff;
}
.form-group select { cursor: pointer; }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.role-select { display: flex; gap: 8px; }
.role-option {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
  background: #FAFBFC;
}
.role-option:hover { border-color: var(--primary); }
.role-option.selected { border-color: var(--primary); background: var(--primary-light); }
.role-option .role-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.error-msg { color: var(--danger); font-size: 12px; margin-top: 4px; display: none; }

/* ============================================================
   STATS ROW
   ============================================================ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: default;
}
.stat-icon {
  width: 46px; height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.stat-icon.blue { background: #EEF2FF; color: var(--primary); }
.stat-icon.green { background: #ECFDF5; color: var(--success); }
.stat-icon.orange { background: #FFF7ED; color: var(--warning); }
.stat-icon.red { background: #FEF2F2; color: var(--danger); }
.stat-icon.purple { background: #F5F3FF; color: #7C3AED; }
.stat-value { font-size: 24px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 12px; color: var(--text-secondary); }

/* ============================================================
   CARDS & LISTS
   ============================================================ */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.card-header h3 { font-size: 16px; }

.tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
  border: none;
  background: none;
}
.tab.active { background: var(--primary); color: #fff; font-weight: 600; }
.tab:hover:not(.active) { background: #F9FAFB; }

.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}
.tag-pending { background: #EEF2FF; color: var(--primary); }
.tag-accepted { background: #FFF7ED; color: var(--warning); }
.tag-picked_up { background: #FEF3C7; color: #B45309; }
.tag-delivering { background: #DBEAFE; color: #1D4ED8; }
.tag-delivered { background: var(--success-light); color: var(--success); }
.tag-rated { background: #F3E8FF; color: #7C3AED; }
.tag-urgent { background: var(--danger-light); color: var(--danger); }

.order-list { display: flex; flex-direction: column; gap: 12px; }
.order-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  transition: var(--transition);
  border: 2px solid transparent;
  cursor: pointer;
}
.order-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
.order-card.urgent { border-left: 4px solid var(--danger); }
.order-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.order-id { font-weight: 700; font-size: 14px; }
.order-time { font-size: 12px; color: var(--text-secondary); }
.order-route {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
}
.route-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.route-dot.from { background: var(--danger); }
.route-dot.to { background: var(--success); }
.route-line { flex: 1; height: 1.5px; background: var(--border); border-radius: 1px; }
.route-text { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.order-price { font-size: 20px; font-weight: 700; color: var(--primary); }
.order-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border-radius: 16px;
  width: 520px;
  max-width: 90vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  z-index: 1;
}
.modal-header h3 { font-size: 16px; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: #F3F4F6;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
}
.modal-close:hover { background: #E5E7EB; color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-actions { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.detail-row:last-child { border-bottom: none; }
.detail-label { color: var(--text-secondary); min-width: 70px; }
.detail-value { font-weight: 500; text-align: right; }

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ============================================================
   STAR RATING
   ============================================================ */
.stars { display: flex; gap: 4px; cursor: pointer; }
.stars .star { font-size: 28px; color: #E5E7EB; transition: var(--transition); }
.stars .star.active { color: #F59E0B; }
.stars .star:hover { transform: scale(1.15); }

/* ============================================================
   STATUS TIMELINE
   ============================================================ */
.timeline { display: flex; align-items: center; gap: 0; margin: 16px 0; }
.timeline-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  position: relative;
}
.timeline-step::after {
  content: '';
  position: absolute;
  top: 16px;
  left: 50%;
  width: 100%;
  height: 2px;
  background: var(--border);
  z-index: 0;
}
.timeline-step:last-child::after { display: none; }
.timeline-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  z-index: 1;
  position: relative;
}
.timeline-dot.done { background: var(--success); color: #fff; }
.timeline-dot.current { background: var(--primary); color: #fff; box-shadow: 0 0 0 4px rgba(79,110,247,.2); }
.timeline-label { font-size: 11px; color: var(--text-secondary); text-align: center; }

/* ============================================================
   EARNINGS / ADMIN CHARTS
   ============================================================ */
.earnings-bar {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 160px;
  padding: 0 8px;
}
.earnings-bar .bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.earnings-bar .bar {
  width: 100%;
  max-width: 48px;
  background: var(--primary);
  border-radius: 6px 6px 0 0;
  transition: var(--transition);
  min-height: 4px;
}
.earnings-bar .bar:hover { background: var(--primary-dark); }
.earnings-bar .bar-label { font-size: 11px; color: var(--text-secondary); }
.earnings-bar .bar-value { font-size: 11px; font-weight: 600; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
  font-weight: 600;
  white-space: nowrap;
}
table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table tr:hover td { background: #F9FAFB; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .navbar { padding: 0 12px; }
  .navbar-nav button { padding: 6px 10px; font-size: 12px; }
  .navbar-user .user-name { display: none; }
  .container { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .auth-card { padding: 24px; }
  .timeline { flex-wrap: wrap; gap: 8px; }
  .timeline-step { min-width: 45%; }
  .timeline-step::after { display: none; }
  .earnings-bar { height: 120px; }
}

/* ============================================================
   SECTION HEADER
   ============================================================ */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.section-header h2 { font-size: 20px; font-weight: 700; }
.section-header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }

.badge-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 4px;
}
.badge-dot.online { background: var(--success); }
.badge-dot.offline { background: var(--text-muted); }

/* quick action cards on user home */
.quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.quick-action {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: var(--transition);
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  gap: 14px;
}
.quick-action:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
.quick-action .qa-icon { font-size: 32px; }
.quick-action h4 { font-size: 14px; margin-bottom: 2px; }
.quick-action p { font-size: 12px; color: var(--text-secondary); }

/* ============================================================
   SEARCH BAR
   ============================================================ */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-bottom: 16px;
  transition: var(--transition);
}
.search-bar:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,110,247,.1);
}
.search-icon { font-size: 16px; flex-shrink: 0; }
.search-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  font-family: inherit;
  background: transparent;
  color: var(--text);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
}
.search-clear:hover { background: var(--bg); color: var(--text); }

/* ============================================================
   SETTINGS & STATS
   ============================================================ */
.progress-bar {
  flex: 1;
  height: 18px;
  background: var(--bg);
  border-radius: 9px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 9px;
  transition: width .3s;
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 768px) {
  .stat-grid { grid-template-columns: 1fr; }
}

/* ============================================================
   WITHDRAWAL / APPLICATION CARDS
   ============================================================ */
.info-banner {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  margin-bottom: 12px;
  line-height: 1.6;
}
.info-banner.warn { background: #FFF7ED; color: #92400E; border: 1px solid #FED7AA; }
.info-banner.info { background: #EEF2FF; color: #3730A3; border: 1px solid #C7D2FE; }
.info-banner.success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
</style>
</head>

<nav class="navbar">
  <div class="navbar-brand" onclick="goHome()">
    <div class="icon">📦</div>

</nav>

<div class="container">

  <div class="view" id="view-userHome"></div>

  <div class="view" id="view-runnerEarnings"></div>
  <div class="view" id="view-runnerApply"></div>
  <div class="view" id="view-runnerWithdraw"></div>
  <div class="view" id="view-adminDashboard"></div>
  <div class="view" id="view-adminUsers"></div>
  <div class="view" id="view-adminOrders"></div>
  <div class="view" id="view-adminRunners"></div>
  <div class="view" id="view-adminViolations"></div>
  <div class="view" id="view-adminSettings"></div>

// ============================================================
// AUTH & SESSION
// ============================================================
let currentUser = null;

function getUsers() { return loadUsers(); }
function getOrders() { return loadOrders(); }
function getWithdrawals() { return loadWithdrawals(); }
function getViolations() { return loadViolations(); }
function getConfig() { return loadConfig(); }

function login(studentId, password) {
  const users = getUsers();
  const user = users.find(u => u.studentId === studentId && u.password === password);
  if (!user) return { ok: false, msg: '学号或密码错误' };
  if (user.status !== 'active') return { ok: false, msg: '账号已被禁用，请联系管理员' };
  currentUser = user;
  saveSession({ id: user.id, role: user.role });
  return { ok: true, user };
}

function register(name, studentId, phone, password, role) {
  const users = getUsers();
  if (users.find(u => u.studentId === studentId)) return { ok: false, msg: '该学号已注册' };
  if (phone && users.find(u => u.phone === phone)) return { ok: false, msg: '该手机号已注册' };
  // Runner applicants stay as 'user' until admin approves
  const isRunnerApply = role === 'runner';
  const runnerApp = isRunnerApply
    ? { status: 'pending', appliedAt: new Date().toISOString().slice(0, 10), reason: '' }
    : null;
  const newUser = {
    id: 'u' + Date.now(),
    name, phone: phone || '', password,
    role: isRunnerApply ? 'user' : role,  // runner applicants are 'user' until approved
    avatar: name.charAt(0),
    status: 'active',
    createdAt: new Date().toISOString().slice(0, 10),
    studentId,
    balance: 0, totalEarned: 0, totalWithdrawn: 0,
    runnerApplication: runnerApp,
  };
  users.push(newUser);
  saveUsers(users);
  currentUser = newUser;
  saveSession({ id: newUser.id, role: newUser.role });
  return { ok: true, user: newUser };
}

// Apply for runner (existing user)
function applyForRunner(reason) {
  if (!currentUser || currentUser.role !== 'user') return { ok: false, msg: '仅普通用户可申请' };
  if (currentUser.runnerApplication) {
    if (currentUser.runnerApplication.status === 'pending') return { ok: false, msg: '申请审核中，请耐心等待' };
    if (currentUser.runnerApplication.status === 'approved') return { ok: false, msg: '您已是跑腿员' };
  }
  const users = getUsers();
  const user = users.find(u => u.id === currentUser.id);
  user.runnerApplication = { status: 'pending', appliedAt: new Date().toISOString().slice(0, 10), reason: reason || '' };
  saveUsers(users);
  currentUser = user;
  return { ok: true, msg: '申请已提交，等待管理员审核' };
}

function logout() {
  currentUser = null;
  saveSession(null);
  switchView('login');
}

function restoreSession() {
  const session = loadSession();
  if (!session) return false;
  const users = getUsers();
  const user = users.find(u => u.id === session.id && u.role === session.role);
  if (!user || user.status !== 'active') { saveSession(null); return false; }
  currentUser = user;
  return true;
}

// ============================================================
// WITHDRAWAL
// ============================================================
function requestWithdrawal(amount) {
  if (!currentUser || currentUser.role !== 'runner') return { ok: false, msg: '仅跑腿员可提现' };
  const cfg = getConfig();
  if (amount < cfg.minWithdraw) return { ok: false, msg: '最低提现金额为 ¥' + cfg.minWithdraw };
  if (amount > currentUser.balance) return { ok: false, msg: '余额不足，当前余额 ¥' + currentUser.balance.toFixed(0) };
  const withdrawals = getWithdrawals();
  const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
  const w = {
    id: 'w' + Date.now(),
    runnerId: currentUser.id,
    amount: amount,
    status: 'completed',
    requestedAt: now,
    processedAt: now,
    processedBy: 'system',
    note: '微信到账',
  };
  withdrawals.push(w);
  saveWithdrawals(withdrawals);
  // Deduct from balance
  const users = getUsers();
  const user = users.find(u => u.id === currentUser.id);
  user.balance -= amount;
  user.totalWithdrawn += amount;
  saveUsers(users);
  currentUser = user;
  return { ok: true, msg: '提现成功，金额已直接到账' };
}

function processWithdrawal(withdrawalId, action, adminId) {
  const withdrawals = getWithdrawals();
  const w = withdrawals.find(w => w.id === withdrawalId);
  if (!w) return { ok: false, msg: '记录不存在' };
  if (action === 'complete') {
    w.status = 'completed';
    w.processedAt = new Date().toISOString().slice(0, 16).replace('T', ' ');
    w.processedBy = adminId;
    w.note = '已打款';
  } else if (action === 'reject') {
    w.status = 'rejected';
    w.processedAt = new Date().toISOString().slice(0, 16).replace('T', ' ');
    w.processedBy = adminId;
    // Refund balance
    const users = getUsers();
    const user = users.find(u => u.id === w.runnerId);
    if (user) {
      user.balance += w.amount;
      user.totalWithdrawn -= w.amount;
      saveUsers(users);
      if (currentUser && currentUser.id === user.id) currentUser = user;
    }
  }
  saveWithdrawals(withdrawals);
  return { ok: true };
}

// ============================================================
// VIOLATION
// ============================================================
function reportViolation(orderId, reason, action) {
  const violations = getViolations();
  violations.push({
    id: 'v' + Date.now(),
    orderId: orderId,
    reportedBy: currentUser ? currentUser.id : 'system',
    reason: reason,
    action: action, // 'warning' | 'cancel' | 'fine'
    createdAt: new Date().toISOString().slice(0, 16).replace('T', ' '),
  });
  saveViolations(violations);

  if (action === 'cancel') {
    const orders = getOrders();
    const order = orders.find(o => o.id === orderId);
    if (order && !['delivered', 'rated'].includes(order.status)) {
      order.status = 'delivered';
      order.deliveredAt = new Date().toISOString().slice(0, 16).replace('T', ' ');
      order.violation = { reason, action, at: new Date().toISOString().slice(0, 16).replace('T', ' ') };
      saveOrders(orders);
    }
  }
  return { ok: true };
}

// ============================================================
// AUTO VIOLATION CHECK — 接单后24小时未送达自动违规
// ============================================================
function checkOverdueOrders() {
  const orders = getOrders();
  const violations = getViolations();
  const nowTime = new Date();
  let changed = false;

  orders.forEach(order => {
    if (['delivered', 'rated'].includes(order.status)) return;
    if (!order.acceptedAt) return;
    const acceptedTime = new Date(order.acceptedAt);
    const hoursSinceAccept = (nowTime - acceptedTime) / (1000 * 60 * 60);
    if (hoursSinceAccept > 24) {
      order.status = 'delivered';
      order.deliveredAt = nowTime.toISOString().slice(0, 16).replace('T', ' ');
      order.violation = {
        reason: '接单后24小时未送达，系统自动标记违规',
        action: 'cancel',
        at: nowTime.toISOString().slice(0, 16).replace('T', ' ')
      };
      violations.push({
        id: 'v' + Date.now() + Math.random().toString(36).slice(2,6),
        orderId: order.id,
        reportedBy: 'system',
        reason: '接单后24小时未送达（自动检测）',
        action: 'cancel',
        createdAt: nowTime.toISOString().slice(0, 16).replace('T', ' ')
      });
      changed = true;
    }
  });
  if (changed) {
    saveOrders(orders);
    saveViolations(violations);
  }
}

// ============================================================
// HELPERS
// ============================================================
function formatTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  return d.toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function now() { return new Date().toISOString().slice(0, 16).replace('T', ' '); }
function genOrderId() {
  const d = new Date();
  return 'DD' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + String(d.getTime()%100000).padStart(5,'0');
}
function statusLabel(s) {
  const map = { pending:'待接单', accepted:'已接单', picked_up:'已取件', delivering:'配送中', delivered:'已送达', rated:'已评价' };
  return map[s] || s;
}
const STATUS_ORDER = ['pending','accepted','picked_up','delivering','delivered','rated'];
function statusIdx(s) { return STATUS_ORDER.indexOf(s); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(title, bodyHTML, actionsHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalActions').innerHTML = actionsHTML || '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function renderStars(rating, interactive, callback) {
  let html = '<div class="stars" data-rating="' + rating + '">';
  for (let i = 1; i <= 5; i++) {
    html += '<span class="star' + (i <= rating ? ' active' : '') + '" data-star="' + i + '">★</span>';
  }
  html += '</div>';
  if (interactive) {
    setTimeout(() => {
      const starsEl = document.querySelector('.stars');
      if (!starsEl) return;
      starsEl.querySelectorAll('.star').forEach(s => {
        s.addEventListener('click', function() {
          const v = parseInt(this.dataset.star);
          starsEl.setAttribute('data-rating', v);
          starsEl.querySelectorAll('.star').forEach(ss => ss.classList.toggle('active', parseInt(ss.dataset.star) <= v));
          if (callback) callback(v);
        });
        s.addEventListener('mouseenter', function() {
          const v = parseInt(this.dataset.star);
          starsEl.querySelectorAll('.star').forEach(ss => ss.classList.toggle('active', parseInt(ss.dataset.star) <= v));
        });
      });
      starsEl.addEventListener('mouseleave', function() {
        const v = parseInt(starsEl.getAttribute('data-rating'));
        starsEl.querySelectorAll('.star').forEach(ss => ss.classList.toggle('active', parseInt(ss.dataset.star) <= v));
      });
    }, 50);
  }
  return html;
}

function getRunnerName(runnerId) {
  if (!runnerId) return '-';
  const u = getUsers().find(u => u.id === runnerId);
  return u ? u.name : '未知';
}
function getUserName(userId) {
  if (!userId) return '-';
  const u = getUsers().find(u => u.id === userId);
  return u ? u.name : '未知';
}

// ============================================================
// SEARCH / FILTER
// ============================================================
function filterByKeyword(items, keyword, fields) {
  if (!keyword || !keyword.trim()) return items;
  const kw = keyword.trim().toLowerCase();
  return items.filter(item => {
    return fields.some(f => {
      const val = item[f];
      if (val == null) return false;
      return String(val).toLowerCase().includes(kw);
    });
  });
}

function renderSearchBar(placeholder, inputId, onInputFn) {
  return `
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="${inputId}"
             placeholder="${placeholder || '搜索订单号/取件点/送达点...'}"
             oninput="${onInputFn}(this.value)">
      ${onInputFn ? `<button class="search-clear" onclick="document.getElementById('${inputId}').value='';${onInputFn}('');" style="display:none;" id="${inputId}_clear">✕</button>` : ''}
    </div>
  `;
}

function handleAuth() {
  const studentId = document.getElementById('authStudentId').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const errEl = document.getElementById('authError');

  if (!studentId) { errEl.style.display = 'block'; errEl.textContent = '请输入学号'; return; }
  if (!password) { errEl.style.display = 'block'; errEl.textContent = '请输入密码'; return; }

  if (authMode === 'login') {
    const result = login(studentId, password);
    if (!result.ok) { errEl.style.display = 'block'; errEl.textContent = result.msg; return; }
    errEl.style.display = 'none';
    showToast('✅ 登录成功！欢迎，' + result.user.name);
    goHome();
  } else {
    const name = document.getElementById('authName').value.trim();
    const phone = document.getElementById('authPhone') ? document.getElementById('authPhone').value.trim() : '';
    if (!name) { errEl.style.display = 'block'; errEl.textContent = '请输入姓名'; return; }
    if (password.length < 6) { errEl.style.display = 'block'; errEl.textContent = '密码至少6位'; return; }
    const result = register(name, studentId, phone, password, registerRole);
    if (!result.ok) { errEl.style.display = 'block'; errEl.textContent = result.msg; return; }
    errEl.style.display = 'none';
    if (registerRole === 'runner') {
      showToast('🎉 跑腿申请已提交，等待管理员审核');
    } else {
      showToast('🎉 注册成功！欢迎加入，' + result.user.name);
    }
    goHome();
  }
}

function submitOrder() {
  const pickupIdx = parseInt(document.getElementById('coPickup').value);
  const delivery = document.getElementById('coDelivery').value;
  const pkgType = document.getElementById('coType').value;
  const weight = document.getElementById('coWeight').value || '1.0kg';
  const desc = document.getElementById('coDesc').value.trim();
  const phone = document.getElementById('coPhone').value.trim();
  const price = parseInt(document.getElementById('coPrice').value) || 5;
  const deadline = document.getElementById('coDeadline').value.replace('T', ' ') || '';
  const notes = document.getElementById('coNotes').value.trim();
  const errEl = document.getElementById('coError');

  if (isNaN(pickupIdx)) { errEl.style.display='block'; errEl.textContent='请选择取件点'; return; }
  if (!delivery) { errEl.style.display='block'; errEl.textContent='请选择送达地址'; return; }
  if (!desc) { errEl.style.display='block'; errEl.textContent='请描述包裹内容'; return; }
  if (price < 3 || price > 50) { errEl.style.display='block'; errEl.textContent='配送费建议在3-50元之间'; return; }

  const pickup = PICKUP_POINTS[pickupIdx];
  const fee = Math.round(price * getConfig().platformFeeRate / 100 * 10) / 10;

  const order = {
    id: genOrderId(),
    userId: currentUser.id,
    runnerId: null,
    pickup: pickup.name,
    pickupDetail: pickup.detail,
    delivery: delivery,
    deliveryDetail: delivery,
    recipient: currentUser.name,
    recipientPhone: phone || currentUser.phone,
    packageType: pkgType,
    packageDesc: desc,
    weight: weight,
    price: price,
    fee: fee,
    status: 'pending',
    notes: notes,
    deadline: deadline,
    createdAt: now(),
    acceptedAt: null, pickedUpAt: null, deliveringAt: null, deliveredAt: null,
    rating: 0, ratingComment: '',
  };

  const orders = getOrders();
  orders.unshift(order);
  saveOrders(orders);

  closeModal();
  showToast('✅ 订单发布成功！等待跑腿员接单');
  renderUserHome();
}

    actions += `<button class="btn btn-warning" onclick="showRatingForm('${order.id}')">⭐ 评价跑腿</button>`;

function userCancelOrder(orderId) {
  if (!confirm('确定要取消该订单吗？')) return;
  const orders = getOrders();
  const order = orders.find(o => o.id === orderId);
  if (order && order.status === 'pending') {
    order.status = 'delivered';
    order.deliveredAt = now();
    saveOrders(orders);
  }
  closeModal();
  showToast('❌ 订单已取消');
  renderUserOrders();
}

function renderOrderTimeline(order) {
  const si = statusIdx(order.status);
  const steps = ['pending','accepted','picked_up','delivering','delivered'];
  const labels = ['待接单','已接单','已取件','配送中','已送达'];
  let html = '<div class="timeline">';
  steps.forEach((s, i) => {
    let cls = '';
    if (i < si) cls = 'done';
    else if (i === si && order.status !== 'rated') cls = 'current';
    if (order.status === 'rated') cls = 'done';
    const icon = i < si || order.status === 'rated' ? '✓' : (i === si ? '●' : '');
    html += `<div class="timeline-step">
      <div class="timeline-dot ${cls}">${icon}</div>
      <div class="timeline-label">${labels[i]}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderRunnerEarnings() {
  const orders = getOrders().filter(o => o.runnerId === currentUser.id);
  const doneOrders = orders.filter(o => ['delivered','rated'].includes(o.status));
  const totalEarnings = doneOrders.reduce((s, o) => s + (o.price - o.fee), 0);
  const totalOrders = doneOrders.length;
  const avgRating = doneOrders.filter(o => o.rating > 0).reduce((s,o,i,arr) => s + o.rating/arr.length, 0);

  // Today's earnings
  const today = new Date().toISOString().slice(0, 10);
  const todayOrders = doneOrders.filter(o => (o.deliveredAt || '').startsWith(today));
  const todayEarnings = todayOrders.reduce((s, o) => s + (o.price - o.fee), 0);

  // Weekly bar chart data
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const ds = d.toISOString().slice(0, 10);
    const dayOrders = doneOrders.filter(o => (o.deliveredAt || '').startsWith(ds));
    days.push({
      label: ['日','一','二','三','四','五','六'][d.getDay()],
      date: ds.slice(5),
      amount: dayOrders.reduce((s, o) => s + (o.price - o.fee), 0),
      count: dayOrders.length,
    });
  }
  const maxAmount = Math.max(...days.map(d => d.amount), 1);

  document.getElementById('view-runnerEarnings').innerHTML = `
    <div class="section-header"><div><h2>💰 收入看板</h2><p>辛苦啦！这是你的劳动成果</p></div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon green">💰</div><div><div class="stat-value">¥${todayEarnings.toFixed(0)}</div><div class="stat-label">今日收入</div></div></div>
      <div class="stat-card"><div class="stat-icon blue">📊</div><div><div class="stat-value">¥${totalEarnings.toFixed(0)}</div><div class="stat-label">累计收入</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">📦</div><div><div class="stat-value">${totalOrders}</div><div class="stat-label">累计完成</div></div></div>
      <div class="stat-card"><div class="stat-icon purple">⭐</div><div><div class="stat-value">${avgRating.toFixed(1)}</div><div class="stat-label">平均评分</div></div></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <h3 style="margin-bottom:16px;">📈 近7天收入</h3>
      <div class="earnings-bar">
        ${days.map(d => `
          <div class="bar-col">
            <div class="bar-value">¥${d.amount.toFixed(0)}</div>
            <div class="bar" style="height:${(d.amount/maxAmount*120) || 4}px;" title="${d.date}: ¥${d.amount.toFixed(1)} (${d.count}单)"></div>
            <div class="bar-label">${d.label}<br>${d.date}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px;">📋 完成记录</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>订单号</th><th>取件点</th><th>送达点</th><th>收入</th><th>评分</th><th>完成时间</th></tr></thead>
          <tbody>
            ${doneOrders.slice(-10).reverse().map(o => `
              <tr>
                <td style="font-weight:600;">#${o.id.slice(-8)}</td>
                <td>${o.pickup}</td>
                <td>${o.delivery}</td>
                <td style="color:var(--primary);font-weight:600;">¥${(o.price-o.fee).toFixed(1)}</td>
                <td>${o.rating > 0 ? '⭐'.repeat(o.rating) : '-'}</td>
                <td style="color:var(--text-secondary);">${formatTime(o.deliveredAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

  if (filter === 'pending') orders = orders.filter(o => o.status === 'pending');
  if (filter === 'active') orders = orders.filter(o => !['delivered','rated'].includes(o.status));
  if (filter === 'done') orders = orders.filter(o => ['delivered','rated'].includes(o.status));
  orders = filterByKeyword(orders, adminOrderSearch, ['id','pickup','delivery','packageDesc','recipient', 'userId', 'runnerId']);
  document.getElementById('adminOrderList').innerHTML = renderOrderList(orders, 'admin');
}

function adminCancelOrder(orderId) {
  if (!confirm('确定要强制取消该订单吗？此操作不可恢复。')) return;
  const orders = getOrders();

    saveOrders(orders);

  showToast('⚠ 订单已被管理员取消');

function renderAdminStats() {

  const totalFee = orders.reduce((s,o) => s + o.fee, 0);

    dailyStats.push({ label: ['日','一','二','三','四','五','六'][d.getDay()], date: ds.slice(5), created: dayOrders.length, completed: dayOrders.filter(o=>['delivered','rated'].includes(o.status)).length, fee: dayOrders.reduce((s,o)=>s+o.fee,0) });

      <div class="earnings-bar">
        ${dailyStats.map(d => `
          <div class="bar-col">
            <div class="bar-value">${d.created}</div>
            <div class="bar" style="height:${(d.created/maxCreated*120)||4}px;background:var(--primary);" title="新建:${d.created} 完成:${d.completed}"></div>
            <div class="bar-label">${d.label}<br>${d.date}</div>

        <span>🟦 新建订单</span><span>🟢 完成: ${dailyStats.reduce((s,d)=>s+d.completed,0)}</span><span>💰 抽成: ¥${dailyStats.reduce((s,d)=>s+d.fee,0).toFixed(0)}</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card">
        <h3 style="margin-bottom:12px;">📦 订单状态分布</h3>

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

              <div style="height:100%;width:${orders.length?(v/orders.length*100):0}%;background:var(--primary);border-radius:9px;transition:width .3s;"></div>
            </div>
            <span style="font-size:12px;font-weight:600;width:30px;">${v}</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <h3 style="margin-bottom:12px;">📋 包裹类型分布</h3>
        ${Object.entries(byType).map(([k,v]) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="font-size:12px;width:50px;">${k}</span>
            <div style="flex:1;height:18px;background:var(--bg);border-radius:9px;overflow:hidden;">
              <div style="height:100%;width:${orders.length?(v/orders.length*100):0}%;background:${k==='急件'?'var(--danger)':'var(--success)'};border-radius:9px;"></div>
            </div>
            <span style="font-size:12px;font-weight:600;width:30px;">${v}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px;">💡 关键指标</h3>
      <div class="stats-row" style="margin-bottom:0;">
        <div class="stat-card"><div class="stat-icon green">📈</div><div><div class="stat-value">${orders.length ? (orders.filter(o=>['delivered','rated'].includes(o.status)).length/orders.length*100).toFixed(1) : 0}%</div><div class="stat-label">订单完成率</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">👥</div><div><div class="stat-value">${users.filter(u=>u.role==='user').length}</div><div class="stat-label">注册用户</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">🏃</div><div><div class="stat-value">${runners.length}</div><div class="stat-label">跑腿员</div></div></div>
        <div class="stat-card"><div class="stat-icon red">💵</div><div><div class="stat-value">${cfg.platformFeeRate}%</div><div class="stat-label">平台费率</div></div></div>
      </div>
    </div>
  `;
}

// ============================================================
// INIT
// ============================================================
function init() {
  seedData();
  checkOverdueOrders();
  const restored = restoreSession();
  if (restored) {
    goHome();
  } else {
    switchView('login');
  }
}

init();
</script>
</body>
</html>
